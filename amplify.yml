version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - ~/.pnpm-store/**/*